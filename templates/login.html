<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Meridian Data</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 40px;
        }

        .login-card h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .login-card input {
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <form method="POST" class="card login-card">
        <h2>✨ Meridian Data</h2>
        <p>Sign in to your database workspace</p>
    
        <input name="username" placeholder="Username" required autocomplete="username">
        <input name="password" type="password" placeholder="Password" required autocomplete="current-password">
    
        <button type="submit" class="btn-primary" style="margin-top: 24px; padding: 14px;">Continue</button>
    
        {% if error %}
        <div class="error-card" style="margin-top:20px; padding: 12px; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}
    </form>
</div>

</body>
</html>
