version: 3

# --- v3 explicit service wiring (migrated from v2) ---
# System Under Test = the Meridian Data API (tested live). Its only external dependency,
# the LLM provider, is virtualized as a mock — so the AI-calling endpoints run
# deterministically and zero-token. This mirrors the real architecture 1:1.
systemUnderTest:
  service:
    $ref: "#/components/services/meridianDataApi"

dependencies:
  services:
    - service:
        $ref: "#/components/services/llmProvider"

components:
  sources:
    local:
      filesystem:
        directory: .
  services:
    meridianDataApi:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/local"
            specs:
              - contract_public.yaml
              - api_contract.yaml
      runOptions:
        $ref: "#/components/runOptions/meridianTest"
    llmProvider:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/local"
            specs:
              - llm_contract.yaml
      runOptions:
        $ref: "#/components/runOptions/llmMock"
  runOptions:
    meridianTest:
      openapi:
        type: test
        baseUrl: http://localhost:5001
        # App exposes a Spring-Actuator-style mapping endpoint (test-only) so Specmatic
        # reads the real routes and reports ACTUAL coverage. Set explicitly (not just
        # auto-probed) so every Specmatic version picks it up.
        actuatorUrl: http://localhost:5001/actuator/mappings
        specs:
          - spec:
              id: api_contract.yaml
              securitySchemes:
                bearerAuth:
                  type: bearer
                  token: ${SPECMATIC_BEARER_TOKEN:specmatic-ci-token}
    llmMock:
      openapi:
        type: mock
        baseUrl: http://localhost:9090

# --- v3 report configuration: text + HTML coverage reports ---
specmatic:
  governance:
    report:
      formats:
        - html
        - ctrf
      outputDirectory: build/reports/specmatic
    successCriteria:
      minCoveragePercentage: 0
      maxMissedOperationsInSpec: 0
      enforce: false
