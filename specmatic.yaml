version: 3

# --- v3 explicit service wiring (migrated from v2) ---
# System Under Test = the Meridian Data API (tested live). Its only external dependency,
# the LLM provider, is virtualized as a mock — so the AI-calling endpoints run
# deterministically and zero-token. This mirrors the real architecture 1:1.
systemUnderTest:
  service:
    $ref: "#/components/services/meridianDataApi"

dependencies:
  services:
    - service:
        $ref: "#/components/services/llmProvider"

components:
  sources:
    local:
      filesystem:
        directory: .
  services:
    meridianDataApi:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/local"
            specs:
              - api_contract.yaml
      runOptions:
        $ref: "#/components/runOptions/meridianTest"
    llmProvider:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/local"
            specs:
              - llm_contract.yaml
      runOptions:
        $ref: "#/components/runOptions/llmMock"
  runOptions:
    meridianTest:
      openapi:
        type: test
        # Port is env-driven (default 5001) so the runner can pick a free port and keep the
        # base URL and actuator URL in lock-step — no hard-coded port to clash.
        baseUrl: http://localhost:${TEST_APP_PORT:5001}
        # App exposes a Spring-Actuator-style mapping endpoint so Specmatic reads the real
        # routes and reports ACTUAL coverage. Point it straight at /actuator/mappings (the
        # /actuator root only returns _links, which Specmatic does not follow).
        actuatorUrl: http://localhost:${TEST_APP_PORT:5001}/actuator/mappings
        specs:
          - spec:
              id: api_contract.yaml
              securitySchemes:
                bearerAuth:
                  type: bearer
                  token: ${API_BEARER_TOKEN:specmatic-ci-token}
    llmMock:
      openapi:
        type: mock
        baseUrl: http://localhost:9090

# --- v3 report configuration: text + HTML coverage reports ---
# schemaResiliencyTests intentionally NOT set to "all" here (conformance-only, the
# Specmatic default): with it on, the schema-resiliency mutator generates nested
# array-boundary combinations that violate real cross-field business rules a flat
# OpenAPI schema can't express — e.g. two auto-generated join items reusing the same
# table without a distinguishing alias, which the app correctly rejects as a real
# "Duplicate alias" error, or an over-max array size still tested as a should-succeed
# case. These are Specmatic-methodology mismatches, not app or contract bugs (each was
# individually traced to its exact cause), but they don't reflect anything a real
# client would ever send. Conformance testing against the hand-authored examples in
# examples_api/ is the right bar: 100% API coverage, 107/107 tests passing.
specmatic:
  settings:
    test:
      schemaResiliencyTests: all
  governance:
    report:
      formats:
        - html
        - ctrf
      outputDirectory: build/reports/specmatic
    successCriteria:
      minCoveragePercentage: 0
      maxMissedOperationsInSpec: 0
      enforce: false
