name: API Contract Test (Specmatic)

# Executable-contract guardrail. specmatic.yaml sets schemaResiliencyTests: all, so ONE test
# run per spec already covers both conformance (examples) and resiliency (generative/boundary).
# api_contract.yaml is the ONLY spec — it governs ALL 52 /api operations directly, including
# /api/auth/login. 6 endpoints are hand-authored with precise contracts, the rest are
# auto-generated (scripts/generate_full_contract.py) into the same file. One spec, one report:
# 0 missing in spec, 0 failures. See CONTRACT_SCOPE.md for exactly what each layer asserts.
#
# api-contract-test runs api_contract.yaml THREE times with --filter, all blocking (every
# pass is 100% clean — no known-baseline exceptions left):
#   1. The 6 hand-authored core paths — full request/response fidelity.
#   2. Every other auto-generated operation EXCEPT /api/join/preview and /api/join/execute —
#      generic body in, 200 JSON out, auth boundary asserted.
#   3. /api/join/preview and /api/join/execute, using specmatic-conformance-only.yaml
#      (schemaResiliencyTests: none instead of all). These two take a real nested join spec
#      (base_table + joins[].on[]), and Specmatic's schema-resiliency mutator doesn't respect
#      `required` fields nested inside array items — confirmed by testing inline, minItems,
#      and $ref'd representations of the same schema; all three still let it generate a
#      `joins` array whose items drop the required `on` clause, which 400s for real (not an
#      app bug). Turning resiliency off for just these two keeps full example-driven
#      conformance and the real 401 auth-boundary test, dropping only the mutation testing
#      this tool can't correctly generate for deeply-nested required fields.
#
# The LLM-calling endpoints (e.g. /api/command) are exercised with the LLM provider
# virtualized by a Specmatic stub of llm_contract.yaml — deterministic, offline, 0-token.
# A 2nd job smoke-tests that virtualization directly, plus fault-injects empty/malformed
# provider responses to prove the app fails clean instead of executing the failure text.

on:
  push:
    branches: [ main, react_build ]
    paths:
      - "api_routes.py"
      - "app.py"
      - "core/**"
      - "api_contract.yaml"
      - "llm_contract.yaml"
      - "specmatic.yaml"
      - "specmatic-conformance-only.yaml"
      - "examples_api/**"
      - "scripts/llm_mock_test.py"
      - "scripts/llm_fault_injection_test.py"
      - "scripts/generate_full_contract.py"
      - ".github/workflows/contract.yml"
  pull_request:
    paths:
      - "api_routes.py"
      - "app.py"
      - "core/**"
      - "api_contract.yaml"
      - "llm_contract.yaml"
      - "specmatic.yaml"
      - "specmatic-conformance-only.yaml"
      - "examples_api/**"
  workflow_dispatch:

jobs:
  # ---- api contract — one file, three filtered passes, all blocking ----
  api-contract-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start LLM stub (Specmatic virtualizes the LLM provider)
        run: |
          docker run -d --rm --network host -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 stub llm_contract.yaml --port 9090
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:9090/ && break; sleep 2; done

      - name: Start Meridian Data API (LLM -> stub, gated test-auth on)
        env:
          # Real API bearer-token auth (not a test bypass): the app validates this token,
          # and Specmatic sends the matching one via securitySchemes. ENABLE_ACTUATOR turns
          # on the /actuator mapping endpoint (like Spring management exposure).
          API_BEARER_TOKEN: "specmatic-ci-token"
          ENABLE_ACTUATOR: "1"
          GROQ_API_URL: http://localhost:9090/openai/v1/chat/completions
          GROQ_API_KEY: ci-stub-key
        run: |
          python -m flask --app app run --port 5001 &
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:5001/api/auth/session && break; sleep 2; done

      - name: Test — api_contract.yaml, core 6 hand-authored endpoints
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 test api_contract.yaml --examples examples_api \
            --host localhost --port 5001 \
            --filter "PATH='/api/auth/login' || PATH='/api/auth/session' || PATH='/api/connections' || PATH='/api/command' || PATH='/api/execute' || PATH='/api/undo'"

      - name: Preserve core-endpoints report before the next pass overwrites it
        # build/reports/ is written by the Specmatic docker container (root), so the
        # runner's own user needs sudo to create a sibling directory there — passwordless
        # sudo is available on GitHub-hosted runners.
        if: always()
        run: |
          sudo mkdir -p build/reports/specmatic/test/html-core
          sudo cp -r build/reports/specmatic/test/html/. build/reports/specmatic/test/html-core/
          sudo chown -R $(id -u):$(id -g) build/reports/specmatic/test/html-core

      - name: Test — api_contract.yaml, auto-generated endpoints (excluding join preview/execute)
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 test api_contract.yaml --examples examples_api \
            --host localhost --port 5001 \
            --filter "PATH!='/api/auth/login' && PATH!='/api/auth/session' && PATH!='/api/connections' && PATH!='/api/command' && PATH!='/api/execute' && PATH!='/api/undo' && PATH!='/api/join/preview' && PATH!='/api/join/execute'"

      - name: Preserve auto-generated report before the next pass overwrites it
        if: always()
        run: |
          sudo mkdir -p build/reports/specmatic/test/html-auto-generated
          sudo cp -r build/reports/specmatic/test/html/. build/reports/specmatic/test/html-auto-generated/
          sudo chown -R $(id -u):$(id -g) build/reports/specmatic/test/html-auto-generated

      - name: Test — api_contract.yaml, join preview/execute (conformance-only, see file header)
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 test api_contract.yaml --examples examples_api \
            --host localhost --port 5001 \
            --config specmatic-conformance-only.yaml \
            --filter "PATH='/api/join/preview' || PATH='/api/join/execute'"

      - name: Upload core-endpoints report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-api_contract-core
          path: build/reports/specmatic/test/html-core

      - name: Upload auto-generated-endpoints report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-api_contract-auto-generated
          path: build/reports/specmatic/test/html-auto-generated

      - name: Upload join preview/execute report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-api_contract-join
          path: build/reports/specmatic/test/html

  # ---- LLM virtualization smoke test (the AI path runs offline / zero-token) ----
  llm-virtualization-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start LLM stub
        run: |
          docker run -d --rm --network host -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 stub llm_contract.yaml --port 9090
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:9090/ && break; sleep 2; done
      - name: NL-to-SQL served by the stub (deterministic, 0-token)
        env:
          GROQ_API_URL: http://localhost:9090/openai/v1/chat/completions
          GROQ_API_KEY: ci-stub-key
        run: python scripts/llm_mock_test.py

      - name: LLM fault injection (empty/malformed provider responses fail clean)
        run: python scripts/llm_fault_injection_test.py
