name: API Contract Test (Specmatic)

# Executable-contract guardrail: every push/PR that touches the API is checked
# against the OpenAPI contract with Specmatic. If the implementation (or an
# AI-generated change) drifts from the contract, this job fails and blocks the merge.

on:
  push:
    branches: [ main, react_build ]
    paths: [ "api_routes.py", "app.py", "api_contract.yaml", "contract_public.yaml", ".github/workflows/contract.yml" ]
  pull_request:
    paths: [ "api_routes.py", "app.py", "api_contract.yaml", "contract_public.yaml" ]
  workflow_dispatch:

jobs:
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Meridian Data API
        run: |
          python -m flask --app app run --port 5001 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5001/api/auth/session > /dev/null && break
            sleep 2
          done

      - name: Run Specmatic contract test (executable contract)
        run: |
          docker run --rm --network host -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:latest test contract_public.yaml --host localhost --port 5001

      # Drift in the API contract -> this step fails -> PR is blocked.
