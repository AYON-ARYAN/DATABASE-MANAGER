name: API Contract Test (Specmatic)

# Executable-contract guardrail. For EACH API spec we run TWO independent jobs:
#   * contract   — value-checked conformance against inline + external examples
#   * resiliency — generative negative/boundary tests (input-validation guardrail)
# With two app specs (contract_public.yaml, api_contract.yaml) that is 4 test jobs,
# kept deliberately separate so a contract regression and a resiliency regression
# show up as distinct red checks. Each job emits a Specmatic HTML report artifact.
#
# The LLM-calling endpoints (e.g. /api/command) are exercised with the LLM provider
# virtualized by a Specmatic stub of llm_contract.yaml — deterministic, offline, 0-token.
# A 5th job smoke-tests that virtualization directly.

on:
  push:
    branches: [ main, react_build ]
    paths:
      - "api_routes.py"
      - "app.py"
      - "core/**"
      - "api_contract.yaml"
      - "contract_public.yaml"
      - "llm_contract.yaml"
      - "specmatic.yaml"
      - "examples/**"
      - "examples_api/**"
      - "scripts/llm_mock_test.py"
      - ".github/workflows/contract.yml"
  pull_request:
    paths:
      - "api_routes.py"
      - "app.py"
      - "core/**"
      - "api_contract.yaml"
      - "contract_public.yaml"
      - "llm_contract.yaml"
      - "specmatic.yaml"
      - "examples/**"
      - "examples_api/**"
  workflow_dispatch:

jobs:
  # ---- 4 test jobs: {contract_public, api_contract} x {contract, resiliency} ----
  api-test:
    name: ${{ matrix.spec }} · ${{ matrix.mode }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - spec: contract_public.yaml
            mode: contract
            examples: "--examples examples"
            generative: "false"
          - spec: contract_public.yaml
            mode: resiliency
            examples: "--examples examples"
            generative: "true"
          - spec: api_contract.yaml
            mode: contract
            examples: "--examples examples_api"
            generative: "false"
          - spec: api_contract.yaml
            mode: resiliency
            examples: "--examples examples_api"
            generative: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start LLM stub (Specmatic virtualizes the LLM provider)
        run: |
          docker run -d --rm --network host -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 stub llm_contract.yaml --port 9090
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:9090/ && break; sleep 2; done

      - name: Start Meridian Data API (LLM -> stub, gated test-auth on)
        env:
          # value doubles as the exact bearer token the contract examples carry, so the
          # examples can exercise BOTH the authenticated (200/400) and the 401 responses.
          SPECMATIC_TEST: "specmatic-ci-token"
          GROQ_API_URL: http://localhost:9090/openai/v1/chat/completions
          GROQ_API_KEY: ci-stub-key
        run: |
          python -m flask --app app run --port 5001 &
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:5001/api/auth/session && break; sleep 2; done

      - name: ${{ matrix.mode }} test — ${{ matrix.spec }} (LLM mocked)
        # specmatic.yaml (committed) configures text + HTML report output.
        run: |
          docker run --rm --network host -e SPECMATIC_GENERATIVE_TESTS=${{ matrix.generative }} \
            -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 test ${{ matrix.spec }} ${{ matrix.examples }} \
            --host localhost --port 5001

      - name: Upload Specmatic HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.spec }}-${{ matrix.mode }}
          path: build/reports/specmatic/test/html

  # ---- LLM virtualization smoke test (the AI path runs offline / zero-token) ----
  llm-virtualization-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start LLM stub
        run: |
          docker run -d --rm --network host -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 stub llm_contract.yaml --port 9090
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:9090/ && break; sleep 2; done
      - name: NL-to-SQL served by the stub (deterministic, 0-token)
        env:
          GROQ_API_URL: http://localhost:9090/openai/v1/chat/completions
          GROQ_API_KEY: ci-stub-key
        run: python scripts/llm_mock_test.py
