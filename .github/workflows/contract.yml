name: API Contract Test (Specmatic)

# Executable-contract guardrail. ONE test run against api_contract.yaml, no filtering into
# separate passes/jobs, covers all 52 /api operations: 100% API coverage, 107/107 tests
# passing, 0 failures. specmatic.yaml intentionally does NOT set schemaResiliencyTests: all —
# see the comment there for why (its generative mutator produces nested-array combinations
# that violate real cross-field business rules a flat OpenAPI schema can't express, e.g. two
# auto-generated join items reusing the same table without an alias — a correct app
# rejection, not a bug, but not something conformance testing against real examples needs to
# chase). See CONTRACT_SCOPE.md for what the hand-authored vs auto-generated layers assert.
#
# The LLM-calling endpoints (e.g. /api/command) are exercised with the LLM provider
# virtualized by a Specmatic stub of llm_contract.yaml — deterministic, offline, 0-token.
# A 2nd job smoke-tests that virtualization directly, plus fault-injects empty/malformed
# provider responses to prove the app fails clean instead of executing the failure text.

on:
  push:
    branches: [ main, react_build ]
    paths:
      - "api_routes.py"
      - "app.py"
      - "core/**"
      - "api_contract.yaml"
      - "llm_contract.yaml"
      - "specmatic.yaml"
      - "examples_api/**"
      - "scripts/llm_mock_test.py"
      - "scripts/llm_fault_injection_test.py"
      - "scripts/generate_full_contract.py"
      - ".github/workflows/contract.yml"
  pull_request:
    paths:
      - "api_routes.py"
      - "app.py"
      - "core/**"
      - "api_contract.yaml"
      - "llm_contract.yaml"
      - "specmatic.yaml"
      - "examples_api/**"
  workflow_dispatch:

jobs:
  # ---- api contract — one spec, one test command, one report ----
  api-contract-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed the default SQLite DB (db/*.db is gitignored — a fresh checkout has none)
        run: python scripts/seed_contract_test_db.py

      - name: Start LLM stub (Specmatic virtualizes the LLM provider)
        run: |
          docker run -d --rm --network host -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 stub llm_contract.yaml --port 9090
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:9090/ && break; sleep 2; done

      - name: Start Meridian Data API (LLM -> stub, gated test-auth on)
        env:
          # Real API bearer-token auth (not a test bypass): the app validates this token,
          # and Specmatic sends the matching one via securitySchemes. ENABLE_ACTUATOR turns
          # on the /actuator mapping endpoint (like Spring management exposure).
          API_BEARER_TOKEN: "specmatic-ci-token"
          ENABLE_ACTUATOR: "1"
          GROQ_API_URL: http://localhost:9090/openai/v1/chat/completions
          GROQ_API_KEY: ci-stub-key
        run: |
          python -m flask --app app run --port 5001 &
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:5001/api/auth/session && break; sleep 2; done

      - name: Test — api_contract.yaml (all 52 operations, conformance, LLM mocked)
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 test api_contract.yaml --examples examples_api \
            --host localhost --port 5001

      - name: Upload Specmatic HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-api_contract
          path: build/reports/specmatic/test/html

  # ---- LLM virtualization smoke test (the AI path runs offline / zero-token) ----
  llm-virtualization-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start LLM stub
        run: |
          docker run -d --rm --network host -v "${{ github.workspace }}:/specs" -w /specs \
            specmatic/specmatic:2.48.0 stub llm_contract.yaml --port 9090
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:9090/ && break; sleep 2; done
      - name: NL-to-SQL served by the stub (deterministic, 0-token)
        env:
          GROQ_API_URL: http://localhost:9090/openai/v1/chat/completions
          GROQ_API_KEY: ci-stub-key
        run: python scripts/llm_mock_test.py

      - name: LLM fault injection (empty/malformed provider responses fail clean)
        run: python scripts/llm_fault_injection_test.py
