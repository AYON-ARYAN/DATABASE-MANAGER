services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meridian-backend
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - meridian-db:/app/db
    expose:
      - "5001"
    ports:
      - "5001:5001"
    networks:
      - meridian-net

  frontend:
    build:
      context: ./meridian-frontend
      dockerfile: Dockerfile
    container_name: meridian-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - meridian-net

networks:
  meridian-net:
    driver: bridge

volumes:
  meridian-db:
    driver: local
