services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meridian-backend
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_API_URL=http://ollama:11434/api/generate
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    volumes:
      - meridian-db:/app/db
    expose:
      - "5001"
    ports:
      - "5001:5001"
    networks:
      - meridian-net

  frontend:
    build:
      context: ./meridian-frontend
      dockerfile: Dockerfile
    container_name: meridian-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - meridian-net

  ollama:
    image: ollama/ollama:latest
    container_name: meridian-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"
    networks:
      - meridian-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: meridian-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["ollama", "pull", "mistral"]
    networks:
      - meridian-net
    restart: "no"

  llm-stub:
    image: specmatic/specmatic:2.48.0
    container_name: meridian-llm-stub
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    command: stub llm_contract.yaml --host 0.0.0.0 --port 9090
    ports:
      - "9090:9090"
    networks:
      - meridian-net

  backend-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meridian-backend-test
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=specmatic-ci-token
      - GROQ_API_URL=http://llm-stub:9090/openai/v1/chat/completions
      - ENABLE_ACTUATOR=1
      - TEST_APP_PORT=5001
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    depends_on:
      - llm-stub
    volumes:
      - meridian-db:/app/db
    ports:
      - "5001:5001"
    networks:
      - meridian-net

  contract-tests:
    image: specmatic/specmatic:2.48.0
    container_name: meridian-contract-tests
    depends_on:
      backend-test:
        condition: service_started
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - TEST_APP_PORT=5001
      - API_BEARER_TOKEN=specmatic-ci-token
    command: test api_contract.yaml --examples examples_api --host backend-test --port 5001
    networks:
      - meridian-net

networks:
  meridian-net:
    driver: bridge

volumes:
  meridian-db:
    driver: local
  ollama-data:
    driver: local
