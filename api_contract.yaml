components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    JoinSpecJoin:
      type: object
      required: [table, "on"]
      properties:
        table: { type: string, example: "Album" }
        # CROSS excluded: it requires an empty "on" (build_join_sql rejects a non-empty
        # one for CROSS), a different shape than the other 4 types, which all require a
        # non-empty "on" — a cross-field constraint this flat schema doesn't express, and
        # not what the one hand-authored example demonstrates.
        type: { type: string, enum: ["INNER", "LEFT", "RIGHT", "FULL"], example: "INNER" }
        on:
          type: array
          minItems: 1
          maxItems: 1
          items:
            type: object
            required: [left_table, left_column, right_table, right_column]
            properties:
              left_table: { type: string, example: "Track" }
              left_column: { type: string, example: "AlbumId" }
              right_table: { type: string, example: "Album" }
              right_column: { type: string, example: "AlbumId" }
              op: { type: string, enum: ["=", "!=", "<>", "<", "<=", ">", ">="], example: "=" }
    LoginOk:
      type: object
      required: [success, username, role]
      properties:
        success:  { type: boolean }
        username: { type: string }
        role:     { type: string }
      example: { success: true, username: "admin1", role: "ADMIN" }
    Failure:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean }
        error:   { type: string }
    Unauthorized:
      type: object
      required: [error]
      properties:
        error: { type: string, example: "Unauthorized" }
    ReadResult:
      type: object
      required: [task, sql, columns, results, page, page_size, total_rows]
      properties:
        task:        { type: string, example: "READ" }
        sql:         { type: string }
        explanation: { type: string }
        columns:     { type: array, items: { type: string } }
        results:     { type: array, items: { type: array, items: {} } }
        page:        { type: integer }
        page_size:   { type: integer }
        total_rows:  { type: integer }
      example:
        task: "READ"
        sql: "SELECT Name FROM Artist LIMIT 3;"
        explanation: "Lists the first three artist names."
        columns: ["Name"]
        results: [["AC/DC"], ["Accept"], ["Aerosmith"]]
        page: 1
        page_size: 50
        total_rows: 275
    NeedsReview:
      type: object
      required: [needs_review, sql, explanation, task]
      properties:
        needs_review: { type: boolean }
        sql:          { type: string }
        explanation:  { type: string }
        task:         { type: string, example: "WRITE" }
      example:
        needs_review: true
        sql: "UPDATE Artist SET Name = 'AC/DC' WHERE ArtistId = 1;"
        explanation: "This modifies data — review before running."
        task: "WRITE"
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
    # /api/command returns diagnostic fields alongside the error (the generated SQL,
    # the task type, and an explanation). Modelling them keeps the oneOf unambiguous:
    # an error response can't be mistaken for a (columns-bearing) ReadResult.
    CommandError:
      type: object
      required: [error]
      properties:
        error:       { type: string }
        sql:         { type: string }
        task:        { type: string }
        explanation: { type: string }
